name: Deploy to GitHub Pages

# Builds the Vite app and publishes dist/ through the modern GitHub Actions Pages pipeline
# (actions/deploy-pages). configure-pages flips the site's Pages source to "GitHub Actions"
# automatically, so no manual Settings change is needed. This replaces the old force-push-to-
# gh-pages flow, whose internal "pages build and deployment" runs could hang silently; this
# path deploys directly and fails loudly on timeout instead.

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Configure Pages (sets the site's source to GitHub Actions)
        uses: actions/configure-pages@v5

      - name: Upload dist/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 300000 # fail loudly after 5 min rather than hanging
