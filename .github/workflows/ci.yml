name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint (incl. sim/ boundary rule)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (headless)
        run: npm test

      - name: Build
        run: npm run build
